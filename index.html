<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2333;
    --border: #30363d;
    --text: #e1e4e8;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --green: #3fb950;
    --tag-bg: #1a2332;
    --tag-text: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  a { color: inherit; text-decoration: none; }

  /* Header */
  .header {
    text-align: center;
    padding: 60px 20px 30px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #161b22 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #58a6ff, #bc8cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 15px;
    margin-top: 8px;
  }

  /* Tags */
  .tags {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 20px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
    user-select: none;
  }
  .tag:hover, .tag.active {
    background: var(--tag-bg);
    color: var(--tag-text);
    border-color: var(--accent);
  }

  /* Grid */
  .grid {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card:active { transform: translateY(0); }
  .card .icon {
    font-size: 36px;
    margin-bottom: 14px;
    display: block;
  }
  .card h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .card .card-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    background: var(--tag-bg);
    color: var(--tag-text);
    margin-bottom: 14px;
  }
  .card .open-btn {
    display: inline-block;
    padding: 7px 18px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    pointer-events: none;
  }
  .card:hover .open-btn {
    background: var(--accent);
    color: #fff;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  .footer span { color: var(--accent); }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 28px; }
    .grid { grid-template-columns: 1fr; padding: 12px; }
  }

  /* Hidden card */
  .card.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>AI Tools</h1>
  <p class="subtitle">实用 AI 工具集合 · 纯前端 · 隐私安全</p>
</div>

<div class="tags">
  <div class="tag active" data-filter="all">全部</div>
  <div class="tag" data-filter="广告试玩">广告试玩</div>
  <div class="tag" data-filter="游戏开发">游戏开发</div>
</div>

<div class="grid" id="grid">

  <!-- Card 1: MTG → Unity -->
  <a href="./mtg2unity-converter/" class="card" data-category="广告试玩">
    <span class="icon">🎮</span>
    <div class="card-tag">广告试玩</div>
    <h3>MTG → Unity Ads 转换器</h3>
    <p>将 MTG 试玩广告文件转换为 Unity Ads 兼容格式，纯前端处理，无需上传服务器。</p>
    <span class="open-btn">打开工具 →</span>
  </a>

  <!-- Card 2: Playable Integrator -->
  <a href="./playable-integrator/" class="card" data-category="游戏开发">
    <span class="icon">🔧</span>
    <div class="card-tag">游戏开发</div>
    <h3>Playable Integrator</h3>
    <p>小游戏 zip 自动接入 PlayTurbo 平台 SDK，AI 注入 + 16 项校验。</p>
    <span class="open-btn">查看详情 →</span>
  </a>

</div>

<div class="footer">
  Powered by <span>GLM-5.2</span> &nbsp;|&nbsp; © 2026 AI Tools
</div>

<script>
  // Tag filter
  const tags = document.querySelectorAll('.tag');
  const cards = document.querySelectorAll('.card');

  tags.forEach(tag => {
    tag.addEventListener('click', () => {
      tags.forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      const filter = tag.dataset.filter;
      cards.forEach(card => {
        if (filter === 'all' || card.dataset.category === filter) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    });
  });
</script>

</body>
</html>
